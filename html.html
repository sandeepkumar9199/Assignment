<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css">   <!-- Add your external CSS link here -->
</head>
<body>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f9;
  }

  .container {
    max-width: 680px;
    margin: 20px auto;
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }

  h1 {
    text-align: center;
  }

  input[type="text"] {
    width: 96%;
    padding: 10px;
    margin-right: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ddd;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background-color: #4CAF50;
    color: white;
    width: 100%;
    margin-top: 2px;
  }

  button:hover {
    background-color: #45a049;
  }

  ul {
    list-style-type: none;
    padding: 0;
  }

  li {
    background-color: #f9f9f9;
    margin: 10px;
    padding: 2px;
    border-radius: 5px;
    border: 1px solid #000;
    /* display: flex; */
    align-items: center;
    justify-content: space-between;
  }

  li.completed {
    text-decoration: line-through;
    color: grey;
  }

  button.edit-btn, button.delete-btn, button.add-subtask-btn {
    /* padding: 5px 10px; */
    font-size: 14px;
    margin-left: 10px;
    border-radius: 5px;
    cursor: pointer;
  }

  button.edit-btn {
    background-color: #FF9800;
    color: white;
    width: 10%;
    margin-left: 40px;
  }

  button.delete-btn {
    background-color: #F44336;
    color: white;
    width: 11%;
  }

  button.add-subtask-btn {
    background-color: #2196F3;
    color: white;
    width: 22%;
  }

  button.checkbox-btn {
    margin-left: 10px;
  }

  .subtask-list {
    margin-top: 10px;
    padding-left: 20px;
  }

</style>

<div class="container">
  <h1>To-Do List</h1>
  <input type="text" id="task-input" placeholder="Enter a new task">
  <button id="add-btn">Add Task</button>
  <ul id="task-list"></ul>
</div>

<script>
    document.getElementById('add-btn').addEventListener('click', function() {
      const taskInput = document.getElementById('task-input');
      const taskText = taskInput.value.trim();
      
      if (taskText !== '') {
        const taskList = document.getElementById('task-list');
        const li = document.createElement('li');
        const timestamp = getFormattedDateTime(); // Get the current timestamp
        
        li.innerHTML = ` 
          <!-- Initially checked checkbox -->
          <input type="checkbox" class="checkbox-btn" checked>
          <span class="task-text">${taskText}</span>
          <span class="timestamp">[${timestamp}]</span>
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
          <button class="add-subtask-btn">Add Sub-Task</button>
          <ul class="subtask-list"></ul>
        `;
        
        // Checkbox functionality
        li.querySelector('.checkbox-btn').addEventListener('change', function() {
          li.classList.toggle('completed');
        });
        
        // Edit button functionality
        li.querySelector('.edit-btn').addEventListener('click', function() {
          const newTaskText = prompt("Edit your task:", taskText);
          if (newTaskText) {
            li.querySelector('.task-text').textContent = newTaskText;
          }
        });
        
        // Delete button functionality
        li.querySelector('.delete-btn').addEventListener('click', function() {
          taskList.removeChild(li);
        });
        
        // Add Sub-Task button functionality
        li.querySelector('.add-subtask-btn').addEventListener('click', function() {
          const subTaskText = prompt("Enter a sub-task:");
          if (subTaskText) {
            const subtaskList = li.querySelector('.subtask-list');
            const subtaskLi = document.createElement('li');
            const subtaskTimestamp = getFormattedDateTime();
            
            subtaskLi.innerHTML = `
              <!-- Initially checked checkbox -->
              <input type="checkbox" class="checkbox-btn" checked>
              <span class="task-text">${subTaskText}</span>
              <span class="timestamp">[${subtaskTimestamp}]</span>
              <button class="edit-btn">Edit</button>
              <button class="delete-btn">Delete</button>
            `;
            
            // Sub-task checkbox functionality
            subtaskLi.querySelector('.checkbox-btn').addEventListener('change', function() {
              subtaskLi.classList.toggle('completed');
            });
            
            // Sub-task edit functionality
            subtaskLi.querySelector('.edit-btn').addEventListener('click', function() {
              const newSubTaskText = prompt("Edit your sub-task:", subTaskText);
              if (newSubTaskText) {
                subtaskLi.querySelector('.task-text').textContent = newSubTaskText;
              }
            });
            
            // Sub-task delete functionality
            subtaskLi.querySelector('.delete-btn').addEventListener('click', function() {
              subtaskList.removeChild(subtaskLi);
            });
            
            subtaskList.appendChild(subtaskLi);
          }
        });
        
        taskList.appendChild(li);
        taskInput.value = ''; // Clear input field
      }
    });
  
    // Function to get formatted date and time
    function getFormattedDateTime() {
      const now = new Date();
      const date = now.toLocaleDateString();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      return `${date} ${time}`;
    }
</script>

</body>
</html>
