<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested To-Do App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: wheat;
        padding: 20px;
    }
    #task-input, #subtask-input {
        width: 300px;
        padding: 10px;
        margin-bottom: 10px;
    }
    task-list{
        width: 100%;
        height: 100vh;
    }
    button {
        padding: 10px 15px;
        margin-left: 5px;
        cursor: pointer;
        background-color: green;
        color: #fff;
    }
    button.Delete{
        background-color: red;
    }
    li{
        background-color: blue;
    }
    .task-item, .subtask-item {
        list-style: none;
        padding: 10px;
        background: #fff;
        margin-right: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        display: flex;
        justify-content: center;
    }
    .task-item .subtasks {
        margin-left: 20px;
    }
    /* .done {
        text-decoration: line-through;
        color: green;
     */
    
    ul{
        /* background: plum; */
        display: flex;
    }
</style>
</head>
<body>

<h1>To-Do Lists</h1>
<input type="text" id="task-input" placeholder="Add a new task">
<button onclick="addTask()">Add Task</button>

<ul id="task-list"></ul>

<script>
    const taskList = document.getElementById("task-list");

function addTask() {
    const taskInput = document.getElementById("task-input");
    const taskText = taskInput.value.trim();
    if (taskText === "") return;

    const taskItem = document.createElement("li");
    taskItem.className = "task-item";

    const taskLabel = document.createElement("span");
    taskLabel.textContent = taskText;

    const addSubTaskBtn = document.createElement("button");
    addSubTaskBtn.textContent = "Add Subtask";
    addSubTaskBtn.onclick = () => addSubTask(taskItem);

    const deleteTaskBtn = document.createElement("button");
    deleteTaskBtn.textContent = "Delete";
    deleteTaskBtn.onclick = () => taskItem.remove();

    const markDoneBtn = document.createElement("button");
    markDoneBtn.textContent = "Done";
    markDoneBtn.onclick = () => {
        taskLabel.classList.toggle("done");
        subtaskList.querySelectorAll(".subtask-item span").forEach(subTask => subTask.classList.toggle("done"));
    };

    const subtaskList = document.createElement("ul");
    subtaskList.className = "subtasks";

    taskItem.append(taskLabel, addSubTaskBtn, markDoneBtn, deleteTaskBtn, subtaskList);
    taskList.appendChild(taskItem);

    taskInput.value = "";
}

function addSubTask(taskItem) {
    const subtaskText = prompt("Enter subtask:");
    if (!subtaskText) return;

    const subtaskItem = document.createElement("li");
    subtaskItem.className = "subtask-item";

    const subtaskLabel = document.createElement("span");
    subtaskLabel.textContent = subtaskText;

    const deleteSubTaskBtn = document.createElement("button");
    deleteSubTaskBtn.textContent = "Delete";
    deleteSubTaskBtn.onclick = () => subtaskItem.remove();

    const markSubTaskDoneBtn = document.createElement("button");
    markSubTaskDoneBtn.textContent = "Done";
    markSubTaskDoneBtn.onclick = () => subtaskLabel.classList.toggle("done");

    subtaskItem.append(subtaskLabel, markSubTaskDoneBtn, deleteSubTaskBtn);
    taskItem.querySelector(".subtasks").appendChild(subtaskItem);
}

</script>
</body>
</html>
